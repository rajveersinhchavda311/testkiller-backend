spring.application.name=backend

# Server port — Render (and most PaaS) inject PORT; bind to it, fall back to 8080 locally.
server.port=${PORT:8080}

# Datasource — fully environment-driven so the same build runs locally (MySQL)
# and in the cloud (TiDB Serverless) with no code change. Defaults are for local dev.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testkiller_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Connection pool — keep modest; TiDB Serverless free tier caps concurrent connections.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
# SQL logging is verbose — keep on locally, turn off in prod via SHOW_SQL=false.
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:true}

# JWT — always override JWT_SECRET in production via environment variable
jwt.secret=${JWT_SECRET:TestKillerSuperSecretKeyForHS256AlgorithmMustBe32BytesLong!}
jwt.expiration.ms=86400000