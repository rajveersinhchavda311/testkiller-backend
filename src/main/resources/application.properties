spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/testkiller_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — always override JWT_SECRET in production via environment variable
jwt.secret=${JWT_SECRET:TestKillerSuperSecretKeyForHS256AlgorithmMustBe32BytesLong!}
jwt.expiration.ms=86400000